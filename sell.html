<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>nunc — list your piece</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Caveat:wght@400;600&family=Inter:opsz,wght@14..32,100..900&family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       Nunc — Design Tokens (mirrored from main)
       ============================================================ */
    :root {
      --butter:  #F7F1E0;
      --pine:    #1A3A2E;
      --peach:   #E8A87C;
      --tomato:  #C44536;
      --sage:    #A8B89C;

      --pine-04: rgba(26, 58, 46, 0.04);
      --pine-08: rgba(26, 58, 46, 0.08);
      --pine-12: rgba(26, 58, 46, 0.12);
      --pine-20: rgba(26, 58, 46, 0.20);
      --pine-40: rgba(26, 58, 46, 0.40);
      --pine-60: rgba(26, 58, 46, 0.60);

      --butter-70: rgba(247, 241, 224, 0.70);

      --bg:           var(--butter);
      --bg-elevated:  #FFFFFF;
      --fg:           var(--pine);
      --fg-muted:     var(--pine-60);
      --fg-subtle:    var(--pine-40);
      --fg-inverse:   var(--butter);

      --border-hairline: var(--pine-08);
      --border-line:     var(--pine-12);

      --font-display: 'Bricolage Grotesque', 'Times New Roman', serif;
      --font-body:    'Inter', system-ui, -apple-system, sans-serif;
      --font-mono:    'JetBrains Mono', ui-monospace, 'SF Mono', monospace;
      --font-hand:    'Caveat', cursive;

      --s-1:   4px;  --s-2:   8px;  --s-3:  12px;  --s-4:  16px;
      --s-5:  20px;  --s-6:  24px;  --s-8:  32px;  --s-10: 40px;
      --s-12: 48px;  --s-16: 64px;  --s-20: 80px;

      --r-xs: 4px; --r-sm: 8px; --r-md: 14px;
      --r-lg: 16px; --r-xl: 24px; --r-pill: 999px;

      --shadow-xs: 0 2px 8px  rgba(26, 58, 46, 0.04);
      --shadow-sm: 0 6px 24px rgba(26, 58, 46, 0.05);
      --shadow-md: 0 8px 30px rgba(26, 58, 46, 0.06);
      --shadow-lg: 0 10px 30px rgba(26, 58, 46, 0.10);

      --ease-out:    cubic-bezier(0.22, 0.61, 0.36, 1);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
      --dur-fast:    140ms;
      --dur-base:    220ms;
      --dur-slow:    420ms;

      --container: 760px;
      --nav-h: 64px;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      color: var(--fg);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }
    button { font: inherit; color: inherit; cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    h1, h2, h3 {
      font-family: var(--font-display);
      color: var(--fg);
      letter-spacing: -0.025em;
      line-height: 1.1;
      font-weight: 700;
      margin: 0;
    }
    input, textarea, select {
      font: inherit;
      color: inherit;
    }

    /* ─── NAV ─────────────────────────── */
    .nav {
      position: sticky; top: 0; z-index: 30;
      background: rgba(247, 241, 224, 0.88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border-hairline);
    }
    .nav-inner {
      max-width: 1040px;
      margin: 0 auto;
      padding: 0 clamp(20px, 6vw, 80px);
      height: var(--nav-h);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: var(--s-4);
    }
    .nav-back {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 500;
      color: var(--fg-muted);
      background: none; border: none;
      display: inline-flex; align-items: center; gap: 8px;
      transition: color var(--dur-base) var(--ease-out);
      padding: 8px 0;
      justify-self: start;
    }
    .nav-back:hover { color: var(--fg); }
    .nav-mark {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 28px;
      letter-spacing: -0.045em;
      line-height: 1;
      color: var(--pine);
      position: relative;
      padding-bottom: 5px;
      display: inline-block;
      justify-self: center;
    }
    .nav-mark::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 4px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 16' preserveAspectRatio='none'><path d='M 8 10 Q 200 18 392 8' stroke='%23C44536' stroke-width='5' fill='none' stroke-linecap='round'/></svg>");
      background-repeat: no-repeat;
      background-size: 100% 100%;
    }
    .nav-draft {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 500;
      background: none;
      border: 1px solid var(--border-line);
      border-radius: var(--r-pill);
      padding: 8px 16px;
      color: var(--fg-muted);
      justify-self: end;
      transition: border-color var(--dur-base) var(--ease-out), color var(--dur-base) var(--ease-out);
    }
    .nav-draft:hover { border-color: var(--fg); color: var(--fg); }

    /* ─── MAIN WRAPPER ─────────────────────────── */
    .page-wrap {
      max-width: var(--container);
      margin: 0 auto;
      padding: 0 clamp(20px, 6vw, 48px) var(--s-20);
    }

    /* ─── HERO ─────────────────────────── */
    .sell-hero {
      padding-top: var(--s-12);
      padding-bottom: var(--s-8);
      border-bottom: 1px solid var(--border-hairline);
    }
    .sell-hero-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--tomato);
      font-weight: 500;
      margin-bottom: var(--s-4);
      display: block;
    }
    .sell-hero h1 {
      font-size: clamp(44px, 7vw, 80px);
      line-height: 0.92;
      letter-spacing: -0.04em;
      font-weight: 800;
      font-variation-settings: 'opsz' 72;
    }
    .sell-hero h1 .dot { color: var(--tomato); }
    .sell-hero-sub {
      margin-top: var(--s-5);
      font-size: 15px;
      color: var(--fg-muted);
      line-height: 1.6;
      max-width: 52ch;
    }

    /* ─── SECTION BLOCKS ─────────────────────────── */
    .sell-section {
      padding-top: var(--s-10);
      padding-bottom: var(--s-8);
      border-bottom: 1px solid var(--border-hairline);
    }
    .sell-section:last-of-type { border-bottom: none; }

    .sell-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--fg-subtle);
      font-weight: 500;
      margin-bottom: var(--s-3);
      display: flex;
      align-items: center;
      gap: var(--s-3);
    }
    .sell-label-num {
      width: 20px; height: 20px;
      border-radius: 999px;
      background: var(--pine);
      color: var(--butter);
      font-size: 9px;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sell-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(22px, 3vw, 30px);
      letter-spacing: -0.02em;
      margin-bottom: var(--s-2);
    }
    .sell-desc {
      font-size: 14px;
      color: var(--fg-muted);
      margin-bottom: var(--s-6);
      line-height: 1.55;
    }

    /* ─── PHOTO UPLOAD ─────────────────────────── */
    .upload-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--s-4);
    }
    .upload-zone {
      border: 2px dashed var(--border-line);
      border-radius: var(--r-xl);
      background: var(--pine-04);
      min-height: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--s-3);
      padding: var(--s-6);
      cursor: pointer;
      transition: border-color var(--dur-base) var(--ease-out), background var(--dur-base) var(--ease-out);
      position: relative;
      text-align: center;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--pine-40);
      background: var(--pine-08);
    }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0;
      opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }
    .upload-icon {
      width: 44px; height: 44px;
      border-radius: 999px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-line);
      display: flex; align-items: center; justify-content: center;
      color: var(--fg-muted);
      box-shadow: var(--shadow-xs);
    }
    .upload-zone-label {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      color: var(--fg);
    }
    .upload-zone-sub {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--fg-subtle);
    }
    .upload-previews {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: var(--s-2);
      margin-top: var(--s-3);
    }
    .upload-preview-thumb {
      aspect-ratio: 1;
      border-radius: var(--r-md);
      overflow: hidden;
      position: relative;
      box-shadow: var(--shadow-xs);
    }
    .upload-preview-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .upload-preview-remove {
      position: absolute; top: 4px; right: 4px;
      width: 20px; height: 20px;
      border-radius: 999px;
      background: rgba(26,58,46,0.7);
      border: none;
      display: flex; align-items: center; justify-content: center;
      color: var(--butter);
      padding: 0;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
    }

    /* Measuring tape hint */
    .tape-hint {
      margin-top: var(--s-4);
      background: rgba(168, 184, 156, 0.18);
      border: 1px solid rgba(168, 184, 156, 0.5);
      border-radius: var(--r-lg);
      padding: var(--s-4) var(--s-5);
      display: flex;
      gap: var(--s-4);
      align-items: flex-start;
    }
    .tape-hint-icon {
      font-size: 22px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .tape-hint-body {}
    .tape-hint-title {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--pine);
      margin-bottom: 4px;
    }
    .tape-hint-text {
      font-size: 13px;
      color: var(--fg-muted);
      line-height: 1.5;
    }

    /* ─── AI PANEL ─────────────────────────── */
    .ai-panel {
      border: 1px solid var(--border-line);
      border-radius: var(--r-xl);
      background: var(--bg-elevated);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .ai-panel-header {
      padding: var(--s-4) var(--s-5);
      border-bottom: 1px solid var(--border-hairline);
      display: flex;
      align-items: center;
      gap: var(--s-3);
      background: var(--pine-04);
    }
    .ai-dot {
      width: 8px; height: 8px;
      border-radius: 999px;
      background: var(--sage);
      flex-shrink: 0;
    }
    .ai-dot.loading {
      background: var(--peach);
      animation: pulse 1.1s ease-in-out infinite;
    }
    .ai-dot.done { background: var(--sage); }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .ai-panel-title {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--fg-muted);
    }
    .ai-panel-badge {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--tomato);
      background: rgba(196, 69, 54, 0.08);
      border: 1px solid rgba(196, 69, 54, 0.18);
      border-radius: var(--r-pill);
      padding: 3px 10px;
    }
    .ai-loading-body {
      padding: var(--s-8) var(--s-5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--s-4);
      text-align: center;
    }
    .ai-loading-dots {
      display: flex; gap: 6px;
    }
    .ai-loading-dots span {
      width: 7px; height: 7px;
      border-radius: 999px;
      background: var(--pine-20);
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .ai-loading-dots span:nth-child(2) { animation-delay: 0.18s; }
    .ai-loading-dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%           { transform: translateY(-6px); opacity: 1; }
    }
    .ai-loading-text {
      font-size: 14px;
      color: var(--fg-muted);
    }
    .ai-results {
      padding: var(--s-5);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--s-3);
    }
    .ai-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .ai-field.full { grid-column: 1 / -1; }
    .ai-field-label {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--fg-subtle);
      font-weight: 600;
    }
    .ai-field-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--fg);
      background: var(--pine-04);
      border: 1px solid var(--border-hairline);
      border-radius: var(--r-sm);
      padding: 8px 12px;
      transition: border-color var(--dur-base) var(--ease-out), background var(--dur-base) var(--ease-out);
    }
    .ai-field-value:focus {
      outline: none;
      border-color: var(--pine-40);
      background: rgba(26,58,46,0.05);
    }
    .ai-footer-note {
      padding: var(--s-3) var(--s-5);
      border-top: 1px solid var(--border-hairline);
      font-size: 12px;
      color: var(--fg-subtle);
      display: flex;
      align-items: center;
      gap: var(--s-2);
    }
    .ai-confidence {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--sage);
    }
    .ai-idle-body {
      padding: var(--s-6) var(--s-5);
      text-align: center;
      font-size: 14px;
      color: var(--fg-subtle);
    }

    /* ─── FORM FIELDS ─────────────────────────── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: var(--s-5);
    }
    .form-group:last-child { margin-bottom: 0; }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--s-4);
    }
    .field-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      font-weight: 600;
      color: var(--fg-muted);
    }
    .field-input {
      background: var(--bg-elevated);
      border: 1px solid var(--border-line);
      border-radius: var(--r-md);
      padding: 12px 16px;
      font-size: 15px;
      color: var(--fg);
      transition: border-color var(--dur-base) var(--ease-out);
      width: 100%;
    }
    .field-input:focus {
      outline: none;
      border-color: var(--pine-40);
    }
    .field-input::placeholder { color: var(--fg-subtle); }
    textarea.field-input {
      resize: vertical;
      min-height: 110px;
      font-size: 14px;
      line-height: 1.6;
    }
    .field-hint {
      font-size: 12px;
      color: var(--fg-subtle);
      line-height: 1.4;
    }

    /* Era picker */
    .era-picker {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--s-2);
    }
    .era-pick-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
    }
    .era-pick-disc {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 999px;
      position: relative;
      transition: transform var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-out);
      box-shadow: 0 0 0 0px transparent;
    }
    .era-pick-disc::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 999px;
      box-shadow: inset 0 0 0 1px rgba(26,58,46,0.10);
      pointer-events: none;
    }
    .era-pick-btn.selected .era-pick-disc {
      box-shadow: 0 0 0 3px var(--pine), 0 4px 12px rgba(26,58,46,0.18);
      transform: translateY(-2px);
    }
    .era-pick-btn:hover .era-pick-disc { transform: translateY(-2px); }
    .era-pick-disc .yr {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(10px, 1.6vw, 16px);
      letter-spacing: -0.03em;
      color: rgba(247, 241, 224, 0.92);
      text-shadow: 0 1px 8px rgba(26,58,46,0.2);
    }
    .era-pick-name {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--fg-muted);
      text-align: center;
    }

    /* Condition picker */
    .cond-picker {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--s-3);
    }
    .cond-pick-btn {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      background: var(--bg-elevated);
      border: 1.5px solid var(--border-line);
      border-radius: var(--r-lg);
      padding: var(--s-4);
      cursor: pointer;
      text-align: left;
      transition: border-color var(--dur-base) var(--ease-out), background var(--dur-base) var(--ease-out);
    }
    .cond-pick-btn:hover { border-color: var(--pine-20); }
    .cond-pick-btn.selected {
      border-color: var(--pine);
      background: var(--pine-04);
    }
    .cond-pick-grade {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--pine);
    }
    .cond-pick-grade.muted { color: var(--tomato); }
    .cond-pick-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--fg);
    }
    .cond-pick-desc {
      font-size: 11px;
      color: var(--fg-subtle);
      line-height: 1.4;
      margin-top: 2px;
    }

    /* Measurements expand */
    .measure-toggle {
      background: none;
      border: 1px solid var(--border-line);
      border-radius: var(--r-md);
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      color: var(--fg-muted);
      display: flex;
      align-items: center;
      gap: var(--s-3);
      width: 100%;
      transition: background var(--dur-base) var(--ease-out), border-color var(--dur-base) var(--ease-out);
    }
    .measure-toggle:hover { background: var(--pine-04); border-color: var(--pine-20); }
    .measure-body {
      margin-top: var(--s-3);
    }
    .measure-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--s-3);
    }

    /* ─── PROVENANCE NOTE ─────────────────────────── */
    .note-wrap {
      position: relative;
      transform: rotate(-0.4deg);
      margin: var(--s-2) 0;
    }
    .note-paper {
      background: #F4E9C8;
      border-radius: var(--r-md);
      padding: 28px 28px 28px 68px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(26,58,46,0.10), 0 1px 3px rgba(26,58,46,0.06), inset 0 1px 0 rgba(255,255,255,0.5);
      min-height: 180px;
    }
    /* horizontal ruled lines */
    .note-paper::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 30px,
        rgba(26, 58, 46, 0.08) 30px,
        rgba(26, 58, 46, 0.08) 31px
      );
      pointer-events: none;
    }
    /* red margin line */
    .note-paper::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0; left: 56px;
      width: 1.5px;
      background: rgba(196, 69, 54, 0.35);
      pointer-events: none;
    }
    .note-prompt {
      font-family: var(--font-hand);
      font-size: 13px;
      color: var(--fg-subtle);
      margin-bottom: 8px;
      font-weight: 400;
      line-height: 31px;
    }
    .note-textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font-hand);
      font-size: 20px;
      font-weight: 400;
      color: var(--pine);
      line-height: 31px;
      min-height: 124px;
      display: block;
      padding: 0;
      letter-spacing: 0.01em;
    }
    .note-textarea::placeholder {
      color: rgba(26, 58, 46, 0.3);
      font-style: italic;
    }
    .note-corner {
      position: absolute;
      bottom: var(--s-4); right: var(--s-5);
      font-family: var(--font-hand);
      font-size: 12px;
      color: rgba(26,58,46,0.25);
      font-style: italic;
    }
    .note-shadow-tape {
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 18px;
      background: rgba(247, 241, 224, 0.55);
      border-radius: 2px;
      box-shadow: 0 1px 3px rgba(26,58,46,0.12);
    }

    /* ─── PRICING ─────────────────────────── */
    .price-input-wrap {
      display: flex;
      align-items: center;
      background: var(--bg-elevated);
      border: 1px solid var(--border-line);
      border-radius: var(--r-md);
      overflow: hidden;
      transition: border-color var(--dur-base) var(--ease-out);
    }
    .price-input-wrap:focus-within { border-color: var(--pine-40); }
    .price-prefix {
      padding: 12px 14px;
      font-family: var(--font-mono);
      font-size: 15px;
      font-weight: 600;
      color: var(--fg-muted);
      border-right: 1px solid var(--border-hairline);
      background: var(--pine-04);
    }
    .price-input {
      flex: 1;
      border: none;
      outline: none;
      padding: 12px 16px;
      font-size: 22px;
      font-weight: 600;
      color: var(--fg);

      font-family: var(--font-display);
      letter-spacing: -0.02em;

    .price-input::placeholder { color: var(--fg-subtle); font-size: 20px; }

      margin-top: var(--s-3);
      font-size: 13px;
      color: var(--fg-subtle);
      display: flex;
      align-items: center;
      gap: 6px;

    .price-range-hint {
      margin-top: var(--s-3);
      background: rgba(168, 184, 156, 0.18);
      border: 1px solid rgba(168, 184, 156, 0.4);
      border-radius: var(--r-md);

      font-size: 13px;
      color: var(--fg-muted);

      align-items: center;
      gap: var(--s-3);

      font-weight: 600;
      color: var(--pine);
    }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--s-4);
      background: var(--bg-elevated);
      border: 1px solid var(--border-line);
      border-radius: var(--r-lg);
      padding: var(--s-4) var(--s-5);
    }
    .toggle-text {}
    .toggle-title { font-size: 14px; font-weight: 600; }
    .toggle-sub { font-size: 12px; color: var(--fg-subtle); margin-top: 2px; }
    .toggle-switch {
      position: relative;
      width: 44px; height: 26px;
      flex-shrink: 0;
    }
    .toggle-switch input {
      opacity: 0; width: 0; height: 0; position: absolute;
    }
    .toggle-track {
      position: absolute; inset: 0;
      background: var(--pine-12);
      border-radius: 999px;
      cursor: pointer;
      transition: background var(--dur-base) var(--ease-out);
    }
    .toggle-switch input:checked + .toggle-track { background: var(--pine); }
    .toggle-track::before {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 20px; height: 20px;
      border-radius: 999px;
      background: white;
      box-shadow: var(--shadow-xs);
      transition: transform var(--dur-base) var(--ease-out);
    }
    .toggle-switch input:checked + .toggle-track::before { transform: translateX(18px); }

    /* ─── SUBMIT ─────────────────────────── */
    .submit-section {

      flex-direction: column;

      justify-content: center;
      gap: 12px;

    .btn-submit::after {

      font-size: 16px;
      letter-spacing: 0;
      transition: transform var(--dur-base) var(--ease-out);

    .btn-submit:hover { opacity: 0.92; }
    .btn-submit:hover::after { transform: translateX(4px); }
    .btn-submit:active { transform: translateY(1px); }
    .btn-draft-lg {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 500;
      background: none;
      border: 1px solid var(--border-line);
      border-radius: var(--r-pill);
      padding: 14px 28px;
      color: var(--fg-muted);
      cursor: pointer;
      transition: border-color var(--dur-base) var(--ease-out), color var(--dur-base) var(--ease-out);

    }
    .btn-draft-lg:hover { border-color: var(--fg); color: var(--fg); }

      text-align: center;
      font-size: 12px;

    /* ─── STAMP ─────────────────────────── */
    .stamp {

      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;

      color: var(--fg-muted);
      border: 1px solid var(--border-line);
      padding: 5px 12px;
      border-radius: var(--r-pill);
      display: inline-flex;
      align-items: center;

    /* ─── RESPONSIVE ─────────────────────────── */
    @media (max-width: 700px) {
      :root { --nav-h: 56px; }

      .nav-inner { grid-template-columns: auto 1fr auto; gap: var(--s-3); }
      .nav-mark { font-size: 24px; }
      .nav-draft { font-size: 9px; padding: 6px 12px; }
      .nav-back span { display: none; }

      .sell-hero h1 { font-size: clamp(36px, 11vw, 60px); }

      .upload-grid { grid-template-columns: 1fr; }
      .upload-zone { min-height: 160px; }

      .era-picker { grid-template-columns: repeat(4, 1fr); }
      .era-pick-name { display: none; }

      .cond-picker { grid-template-columns: 1fr 1fr; }

      .form-grid { grid-template-columns: 1fr; }

      .measure-grid { grid-template-columns: 1fr 1fr; }

      .ai-results { grid-template-columns: 1fr; }
      .ai-field.full { grid-column: 1; }

      .note-paper { padding: 24px 20px 24px 52px; }
      .note-paper::after { left: 42px; }
      .note-textarea { font-size: 18px; }

      .sell-section { padding-top: var(--s-8); }
    }
  </style>

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="app"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─── Data ─── */
const ERAS = [
  { id: 'pre-50', label: 'Pre-50s', year: '<50',  display: "'49", from: '#D9C7A6', to: '#9C7E4A' },
  { id: '50s',    label: '1950s',   year: '50',   display: "'50", from: '#E8A87C', to: '#A35E3F' },
  { id: '60s',    label: '1960s',   year: '60',   display: "'60", from: '#A89D5A', to: '#5C5828' },
  { id: '70s',    label: '1970s',   year: '70',   display: "'70", from: '#C66E3F', to: '#7A2E20' },
  { id: '80s',    label: '1980s',   year: '80',   display: "'80", from: '#7E5BA0', to: '#3A2255' },
  { id: '90s',    label: '1990s',   year: '90',   display: "'90", from: '#5A6B7A', to: '#2A3744' },
  { id: 'y2k',    label: 'Y2K',     year: 'Y2K',  display: 'y2k', from: '#C6CBD3', to: '#6E6F78' },
];

const CONDITIONS = [
  { grade: 'NWT', name: 'New with tags',  desc: 'Unworn. Original tags intact.',            muted: false },
  { grade: 'PR',  name: 'Pristine',       desc: 'Unworn or near-unworn. No flaws.',          muted: false },
  { grade: 'EX',  name: 'Excellent',      desc: 'Lightly worn. No visible imperfections.',   muted: false },
  { grade: 'LV',  name: 'Loved',          desc: 'Honest wear that adds character.',           muted: true  },
  { grade: 'SL',  name: 'Needs some love',desc: 'Wear. Priced for it. Repairable.',           muted: true  },
  { grade: 'AM',  name: 'Already mended', desc: 'Repaired by hand. Repair logged.',           muted: true  },
];

const MOCK_AI = {
  itemType:  'Leather bomber jacket, cropped',
  era:       '70s',
  condition: 'EX',
  fabric:    '100% genuine leather · polyester lining',
  city:      'Detroit',
  priceMin:  145,
  priceMax:  165,
};

/* ─── Icon ─── */
function Icon({ name, size = 18, stroke = 1.75 }) {
  const paths = {
    arrow:    <><path d="M5 12h14"/><path d="m13 5 7 7-7 7"/></>,
    arrowL:   <><path d="M19 12H5"/><path d="m11 19-7-7 7-7"/></>,
    upload:   <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></>,
    x:        <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
    check:    <path d="M20 6 9 17l-5-5"/>,
    sparkle:  <><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></>,
    ruler:    <><path d="M3 7h18"/><path d="M3 12h18"/><path d="M3 17h18"/></>,
    chevron:  <path d="M6 9l6 6 6-6"/>,
    plus:     <><path d="M5 12h14"/><path d="M12 5v14"/></>,
    info:     <><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
         stroke="currentColor" strokeWidth={stroke}
         strokeLinecap="round" strokeLinejoin="round">
      {paths[name]}
    </svg>
  );
}

/* ─── Nav ─── */
function Nav() {
  return (
    <header className="nav">
      <div className="nav-inner">
        <a href="index.html" className="nav-back" aria-label="Back to archive">
          <Icon name="arrowL" size={15} stroke={2}/>
          <span>Back to archive</span>
        </a>
        <a href="index.html" className="nav-mark" aria-label="Nunc — home">nunc</a>
        <button className="nav-draft">Save draft</button>
      </div>
    </header>
  );
}

/* ─── Upload Zone ─── */
function UploadZone({ label, sub, multiple = false, onFiles }) {
  const [dragging, setDragging] = useState(false);
  const inputRef = useRef();

  const handleFiles = (files) => {
    if (!files || !files.length) return;
    const arr = Array.from(files).filter(f => f.type.startsWith('image/'));
    if (arr.length) onFiles(arr);
  };

  return (
    <div
      className={`upload-zone${dragging ? ' drag-over' : ''}`}
      onDragOver={e => { e.preventDefault(); setDragging(true); }}
      onDragLeave={() => setDragging(false)}
      onDrop={e => { e.preventDefault(); setDragging(false); handleFiles(e.dataTransfer.files); }}
      onClick={() => inputRef.current?.click()}
    >
      <input
        ref={inputRef}
        type="file"
        accept="image/*"
        multiple={multiple}
        style={{ display: 'none' }}
        onChange={e => handleFiles(e.target.files)}
      />
      <div className="upload-icon">
        <Icon name="upload" size={20} stroke={1.6}/>
      </div>
      <div className="upload-zone-label">{label}</div>
      <div className="upload-zone-sub">{sub}</div>
    </div>
  );
}

/* ─── Photo Section ─── */
function PhotoSection({ photos, setPhotos, labelPhotos, setLabelPhotos, showTape }) {
  const addPhotos = useCallback((files) => {
    setPhotos(prev => [...prev, ...files.map(f => ({ file: f, url: URL.createObjectURL(f) }))]);
  }, [setPhotos]);

  const addLabel = useCallback((files) => {
    setLabelPhotos(prev => [...prev, ...files.map(f => ({ file: f, url: URL.createObjectURL(f) }))]);
  }, [setLabelPhotos]);

  const removePhoto = (idx) => setPhotos(prev => prev.filter((_, i) => i !== idx));
  const removeLabel = (idx) => setLabelPhotos(prev => prev.filter((_, i) => i !== idx));

  return (
    <>
      <div className="upload-grid">
        <div>
          <div className="sell-label" style={{ marginBottom: 'var(--s-2)' }}>
            Item photos
          </div>
          <UploadZone
            label="Upload item photos"
            sub="Drag & drop · multiple ok"
            multiple
            onFiles={addPhotos}
          />
          {photos.length > 0 && (
            <div className="upload-previews">
              {photos.map((p, i) => (
                <div key={i} className="upload-preview-thumb">
                  <img src={p.url} alt=""/>
                  <button className="upload-preview-remove" onClick={() => removePhoto(i)} aria-label="Remove">
                    ×
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
        <div>
          <div className="sell-label" style={{ marginBottom: 'var(--s-2)' }}>
            Label / tag photo
          </div>
          <UploadZone
            label="Upload the label"
            sub="Fabric care tag, brand tag"
            multiple
            onFiles={addLabel}
          />
          {labelPhotos.length > 0 && (
            <div className="upload-previews">
              {labelPhotos.map((p, i) => (
                <div key={i} className="upload-preview-thumb">
                  <img src={p.url} alt=""/>
                  <button className="upload-preview-remove" onClick={() => removeLabel(i)} aria-label="Remove">
                    ×
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {showTape && (
        <div className="tape-hint">
          <div className="tape-hint-icon">📏</div>
          <div className="tape-hint-body">
            <div className="tape-hint-title">Add a measuring tape</div>
            <div className="tape-hint-text">
              Lay a tape measure next to the piece so buyers can see the actual size at a glance. Include one shot flat-lay showing full length, and one showing width across the chest or hips — it removes the biggest barrier to buying online.
            </div>
          </div>
        </div>
      )}
    </>
  );
}

/* ─── AI Panel ─── */
function AiPanel({ aiState, aiResults, setAiResults }) {
  if (aiState === 'idle') {
    return (
      <div className="ai-panel">
        <div className="ai-panel-header">
          <div className="ai-dot"/>
          <div className="ai-panel-title">Nunc AI · analysis</div>
          <div className="ai-panel-badge">Waiting</div>
        </div>
        <div className="ai-idle-body">
          Upload a photo and we'll read the piece — era, condition, fabric, and a price suggestion.
        </div>
      </div>
    );
  }

  if (aiState === 'loading') {
    return (
      <div className="ai-panel">
        <div className="ai-panel-header">
          <div className="ai-dot loading"/>
          <div className="ai-panel-title">Nunc AI · reading your piece…</div>
          <div className="ai-panel-badge" style={{ color: 'var(--peach)', borderColor: 'rgba(232,168,124,0.3)', background: 'rgba(232,168,124,0.08)' }}>Analysing</div>
        </div>
        <div className="ai-loading-body">
          <div className="ai-loading-dots">
            <span/><span/><span/>
          </div>
          <div className="ai-loading-text">Reading era, condition, fabric…</div>
        </div>
      </div>
    );
  }

  const update = (key, val) => setAiResults(r => ({ ...r, [key]: val }));

  return (
    <div className="ai-panel">
      <div className="ai-panel-header">
        <div className="ai-dot done"/>
        <div className="ai-panel-title">Nunc AI · results</div>
        <div className="ai-panel-badge" style={{ color: 'var(--sage)', borderColor: 'rgba(168,184,156,0.5)', background: 'rgba(168,184,156,0.12)' }}>
          <Icon name="check" size={10} stroke={2.5}/> Done
        </div>
      </div>
      <div className="ai-results">
        <div className="ai-field full">
          <div className="ai-field-label">Item type</div>
          <input
            className="ai-field-value"
            value={aiResults.itemType}
            onChange={e => update('itemType', e.target.value)}
          />
        </div>
        <div className="ai-field">
          <div className="ai-field-label">Era</div>
          <input
            className="ai-field-value"
            value={aiResults.era}
            onChange={e => update('era', e.target.value)}
          />
        </div>
        <div className="ai-field">
          <div className="ai-field-label">Condition</div>
          <input
            className="ai-field-value"
            value={aiResults.condition}
            onChange={e => update('condition', e.target.value)}
          />
        </div>
        <div className="ai-field full">
          <div className="ai-field-label">Fabric composition</div>
          <input
            className="ai-field-value"
            value={aiResults.fabric}
            onChange={e => update('fabric', e.target.value)}
          />
        </div>
      </div>
      <div className="ai-footer-note">
        <Icon name="sparkle" size={12} stroke={1.5}/>
        All fields are editable — correct anything that looks off.
        <span className="ai-confidence">
          <Icon name="check" size={10} stroke={2.5}/> 94% confident
        </span>
      </div>
    </div>
  );
}

/* ─── Era Picker ─── */
function EraPicker({ selected, onSelect }) {
  return (
    <div className="era-picker">
      {ERAS.map(e => (
        <button
          key={e.id}
          className={`era-pick-btn${selected === e.id ? ' selected' : ''}`}
          onClick={() => onSelect(e.id)}
          type="button"
        >
          <div className="era-pick-disc" style={{ background: `linear-gradient(155deg, ${e.from}, ${e.to})` }}>
            <span className="yr">{e.display}</span>
          </div>
          <span className="era-pick-name">{e.label}</span>
        </button>
      ))}
    </div>
  );
}

/* ─── Condition Picker ─── */
function ConditionPicker({ selected, onSelect }) {
  return (
    <div className="cond-picker">
      {CONDITIONS.map(c => (
        <button
          key={c.grade}
          className={`cond-pick-btn${selected === c.grade ? ' selected' : ''}`}
          onClick={() => onSelect(c.grade)}
          type="button"
        >
          <div className={`cond-pick-grade${c.muted ? ' muted' : ''}`}>{c.grade}</div>
          <div className="cond-pick-name">{c.name}</div>
          <div className="cond-pick-desc">{c.desc}</div>
        </button>
      ))}
    </div>
  );
}

/* ─── Provenance Note ─── */
function ProvenanceNote({ value, onChange }) {
  return (
    <div className="note-wrap">
      <div className="note-shadow-tape"/>
      <div className="note-paper">
        <div className="note-prompt">who did this belong to?</div>
        <textarea
          className="note-textarea"
          value={value}
          onChange={e => onChange(e.target.value)}
          placeholder="Found in a basement in Detroit. Smells faintly of cigarettes and cedar. Could've been a trucker, could've been a rock guitarist…"
          rows={4}
        />
        <div className="note-corner">nunc · verified vintage</div>
      </div>
    </div>
  );
}

/* ─── Main App ─── */
function SellApp() {
  const [photos, setPhotos]           = useState([]);
  const [labelPhotos, setLabelPhotos] = useState([]);
  const [aiState, setAiState]         = useState('idle');   // idle | loading | done
  const [aiResults, setAiResults]     = useState(MOCK_AI);

  const [itemName, setItemName]       = useState('');
  const [category, setCategory]       = useState('');
  const [selectedEra, setSelectedEra] = useState(null);
  const [selectedCond, setSelectedCond] = useState(null);
  const [fabric, setFabric]           = useState('');
  const [size, setSize]               = useState('');
  const [description, setDescription] = useState('');
  const [provenance, setProvenance]   = useState('');
  const [price, setPrice]             = useState('');
  const [mended, setMended]           = useState(false);
  const [showMeasure, setShowMeasure] = useState(false);

  // Trigger AI when first photo added
  const aiTriggered = useRef(false);
  useEffect(() => {
    if (photos.length > 0 && aiState === 'idle' && !aiTriggered.current) {
      aiTriggered.current = true;
      setAiState('loading');
      setTimeout(() => {
        setAiState('done');
        // Pre-fill fields from AI
        setItemName(MOCK_AI.itemType);
        setFabric(MOCK_AI.fabric);
        const eraMatch = ERAS.find(e => e.id === MOCK_AI.era);
        if (eraMatch) setSelectedEra(eraMatch.id);
        const condMatch = CONDITIONS.find(c => c.grade === MOCK_AI.condition);
        if (condMatch) setSelectedCond(condMatch.grade);
      }, 2200);
    }
  }, [photos, aiState]);

  const earnings = price ? Math.round(parseFloat(price) * 0.85) : null;

  return (
    <>
      <Nav/>
      <div className="page-wrap">

        {/* ─── Hero ─── */}
        <section className="sell-hero">
          <span className="sell-hero-eyebrow">
            <span className="dot">◆</span> List your piece
          </span>
          <h1>list your<br/>piece<span className="dot">.</span></h1>
          <p className="sell-hero-sub">
            Upload a photo — our AI reads the era, condition, and fabric, then helps you write the listing. Every piece is hand-verified before it goes live.
          </p>
        </section>

        {/* ─── 1. Photos ─── */}
        <section className="sell-section">
          <div className="sell-label">
            <span className="sell-label-num">1</span>
            Photos
          </div>
          <h2 className="sell-title">Show us the piece.</h2>
          <p className="sell-desc">
            Natural light, clean background — let the garment do the talking. More angles = faster verification. A shot of the label helps our AI read it correctly.
          </p>
          <PhotoSection
            photos={photos}
            setPhotos={setPhotos}
            labelPhotos={labelPhotos}
            setLabelPhotos={setLabelPhotos}
            showTape={photos.length > 0}
          />
        </section>

        {/* ─── 2. AI Analysis ─── */}
        <section className="sell-section">
          <div className="sell-label">
            <span className="sell-label-num">2</span>
            AI Analysis
          </div>
          <h2 className="sell-title">We'll read it for you.</h2>
          <p className="sell-desc">
            Upload a photo and Nunc's AI will detect the era, condition, fabric, and a fair price range. You can edit anything — it's a starting point, not a verdict.
          </p>
          <AiPanel aiState={aiState} aiResults={aiResults} setAiResults={setAiResults}/>
        </section>

        {/* ─── 3. Item Details ─── */}
        <section className="sell-section">
          <div className="sell-label">
            <span className="sell-label-num">3</span>
            Item Details
          </div>
          <h2 className="sell-title">Fill in the details.</h2>
          <p className="sell-desc">
            Be honest — buyers trust specifics. The AI has given you a head start; adjust anything that isn't right.
          </p>

          <div className="form-group">
            <label className="field-label">Item name</label>
            <input
              className="field-input"
              placeholder="e.g. Leather bomber jacket, cropped"
              value={itemName}
              onChange={e => setItemName(e.target.value)}
            />
          </div>

          <div className="form-group">
            <div className="field-label">Era</div>
            <EraPicker selected={selectedEra} onSelect={setSelectedEra}/>
          </div>

          <div className="form-group" style={{ marginTop: 'var(--s-5)' }}>
            <div className="field-label">Condition</div>
            <ConditionPicker selected={selectedCond} onSelect={setSelectedCond}/>
          </div>

          <div className="form-grid" style={{ marginTop: 'var(--s-5)' }}>
            <div className="form-group">
              <label className="field-label">Category</label>
              <select className="field-input" value={category} onChange={e => setCategory(e.target.value)}>
                <option value="">Select…</option>
                <option>Outerwear</option>
                <option>Tops &amp; shirts</option>
                <option>Knitwear</option>
                <option>Denim</option>
                <option>Trousers &amp; skirts</option>
                <option>Dresses</option>
                <option>Workwear &amp; military</option>
                <option>Accessories</option>
              </select>
            </div>
            <div className="form-group">
              <label className="field-label">Size</label>
              <input
                className="field-input"
                placeholder="e.g. M · EU 46 · US 38"
                value={size}
                onChange={e => setSize(e.target.value)}
              />
            </div>
          </div>

          <div className="form-group">
            <label className="field-label">Fabric composition</label>
            <input
              className="field-input"
              placeholder="e.g. 100% wool · satin lining"
              value={fabric}
              onChange={e => setFabric(e.target.value)}
            />
          </div>

          <div className="form-group">
            <button
              type="button"
              className="measure-toggle"
              onClick={() => setShowMeasure(m => !m)}
              aria-expanded={showMeasure}
            >
              <Icon name={showMeasure ? 'chevron' : 'plus'} size={15} stroke={2}/>
              Add measurements (optional — but buyers love this)
            </button>
            {showMeasure && (
              <div className="measure-body">
                <div className="measure-grid">
                  {['Chest / bust', 'Shoulder width', 'Length', 'Sleeve'].map(m => (
                    <div className="form-group" key={m} style={{ marginBottom: 0 }}>
                      <label className="field-label">{m}</label>
                      <input className="field-input" placeholder="— cm"/>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          <div className="form-group">
            <label className="field-label">Description</label>
            <textarea
              className="field-input"
              placeholder="Describe the piece as you'd tell a friend — the details, the wear, the feel of the fabric. Mention any flaws honestly."
              value={description}
              onChange={e => setDescription(e.target.value)}
            />
            <div className="field-hint">
              The AI suggestion above can serve as a starting point — personalise it.
            </div>
          </div>
        </section>

        {/* ─── 4. Provenance ─── */}
        <section className="sell-section">
          <div className="sell-label">
            <span className="sell-label-num">4</span>
            A note from before
          </div>
          <h2 className="sell-title">Who did this belong to?</h2>
          <p className="sell-desc">
            Every piece has a past. If you know the story — or can imagine it — leave a note. It's optional, but it's the part buyers remember.
          </p>
          <ProvenanceNote value={provenance} onChange={setProvenance}/>
        </section>

        {/* ─── 5. Pricing ─── */}
        <section className="sell-section">
          <div className="sell-label">
            <span className="sell-label-num">5</span>
            Pricing
          </div>
          <h2 className="sell-title">Set your price.</h2>
          <p className="sell-desc">
            Price honestly — it's a one-of-one. Our AI suggests a fair range based on the era, condition, and comparable pieces.
          </p>

          {aiState === 'done' && (
            <div className="price-range-hint">
              <Icon name="sparkle" size={14} stroke={1.5}/>
              AI suggests
              <span className="price-range-value">${aiResults.priceMin}–${aiResults.priceMax}</span>
              for this piece based on era and condition.
            </div>
          )}

          <div className="form-group" style={{ marginTop: 'var(--s-4)' }}>
            <label className="field-label">Your asking price</label>
            <div className="price-input-wrap">
              <div className="price-prefix">$</div>
              <input
                type="number"
                className="price-input"
                placeholder="0"
                value={price}
                onChange={e => setPrice(e.target.value)}
                min="0"
              />
            </div>
            {earnings !== null && (
              <div className="commission-note">
                <Icon name="info" size={13} stroke={1.6}/>
                You'll receive <strong>${earnings}</strong> after Nunc's 15% commission.
              </div>
            )}
          </div>

          <div className="toggle-row" style={{ marginTop: 'var(--s-4)' }}>
            <div className="toggle-text">
              <div className="toggle-title">Already mended?</div>
              <div className="toggle-sub">Flag this if the piece has been repaired — the repair will be logged and adds to its story.</div>
            </div>
            <label className="toggle-switch">
              <input type="checkbox" checked={mended} onChange={e => setMended(e.target.checked)}/>
              <div className="toggle-track"/>
            </label>
          </div>
        </section>

        {/* ─── Submit ─── */}
        <div className="submit-section">
          <button className="btn-submit" type="button">
            Submit for verification
          </button>
          <button className="btn-draft-lg" type="button">Save draft</button>
          <p className="submit-note">
            Your piece will be hand-verified by a Nunc team member within 48 hours before going live. We'll email you when it's up.
          </p>
        </div>

      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<SellApp/>);
</script>
</body>
</html>
